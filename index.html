<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Z MARKET | JSON Sync Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0c0d; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        .glass { background: #141416; border: 1px solid #2d2d30; border-radius: 20px; }
        select {
            background: #1a1a1c; border: 1px solid #3f3f46; color: white;
            padding: 12px; border-radius: 10px; width: 100%; outline: none;
        }
        select:disabled { opacity: 0.2; cursor: not-allowed; }
        label { font-size: 10px; font-weight: 800; color: #71717a; text-transform: uppercase; margin-bottom: 5px; display: block; }
    </style>
</head>
<body class="p-10 max-w-5xl mx-auto">

    <h1 class="text-3xl font-black italic mb-8">Z MARKET <span class="text-blue-500 text-sm not-italic font-medium ml-2">JSON DRIVE v1.0</span></h1>

    <div class="glass p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div>
                <label>1. Main Category</label>
                <select id="main-menu" onchange="loadSubCategoryFile(this.value)">
                    <option value="">Loading Categories...</option>
                </select>
            </div>
            <div>
                <label>2. Sub-Category</label>
                <select id="sub-menu" onchange="fillItemMenu()" disabled>
                    <option value="">--</option>
                </select>
            </div>
            <div>
                <label>3. Specific Item</label>
                <select id="item-menu" onchange="updateView()" disabled>
                    <option value="">--</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4 pt-6 border-t border-white/5">
            <select id="tier" onchange="updateView()"><option value="T8">Tier 8</option><option value="T7">Tier 7</option><option value="T6">Tier 6</option><option value="T5">Tier 5</option><option value="T4">Tier 4</option></select>
            <select id="enchant" onchange="updateView()"><option value="0">.0</option><option value="1">.1</option><option value="2">.2</option><option value="3" selected>.3</option></select>
            <select id="quality" onchange="updateView()"><option value="1">Normal</option><option value="5" selected>Masterpiece</option></select>
        </div>

        <div id="display" class="hidden mt-10 p-8 border border-blue-500/30 rounded-3xl bg-black/20 flex items-center gap-8">
            <div class="w-24 h-24 bg-black border-2 border-white/10 rounded-2xl flex items-center justify-center relative">
                <img id="render" src="" class="w-20 h-20 object-contain">
                <div id="t-tag" class="absolute top-0 left-0 bg-white text-black text-[10px] font-bold px-1 rounded-br"></div>
            </div>
            <div>
                <h2 id="final-name" class="text-2xl font-black italic"></h2>
                <p id="final-sub" class="text-xs text-blue-400 font-bold uppercase"></p>
            </div>
        </div>
    </div>

    <script>
        let currentFileData = {};

        // INITIAL LOAD: Get the 18 Main Categories
        fetch('main_categories.json')
            .then(res => res.json())
            .then(data => {
                const main = document.getElementById('main-menu');
                main.innerHTML = '<option value="">Select Category</option>';
                data.categories.forEach(cat => {
                    main.innerHTML += `<option value="${cat.file}">${cat.name}</option>`;
                });
            });

        // STEP 1 -> STEP 2: Load the specific JSON file (e.g. chest.json)
        async function loadSubCategoryFile(fileName) {
            if (!fileName) return;
            const res = await fetch(fileName);
            currentFileData = await res.json();

            const subMenu = document.getElementById('sub-menu');
            const itemMenu = document.getElementById('item-menu');
            
            subMenu.innerHTML = '<option value="">Select Sub-Category</option>';
            itemMenu.innerHTML = '<option value="">--</option>';
            itemMenu.disabled = true;

            Object.keys(currentFileData).forEach(key => {
                subMenu.innerHTML += `<option value="${key}">${key}</option>`;
            });
            subMenu.disabled = false;
        }

        // STEP 2 -> STEP 3: Fill the items based on Sub-Category choice
        function fillItemMenu() {
            const subKey = document.getElementById('sub-menu').value;
            const itemMenu = document.getElementById('item-menu');
            itemMenu.innerHTML = '<option value="">Select Item</option>';

            currentFileData[subKey].forEach(item => {
                itemMenu.innerHTML += `<option value="${item.id}" data-name="${item.n}">${item.n}</option>`;
            });
            itemMenu.disabled = false;
        }

        // FINAL STEP: Show result
        function updateView() {
            const itemMenu = document.getElementById('item-menu');
            const id = itemMenu.value;
            if (!id) return;

            const name = itemMenu.options[itemMenu.selectedIndex].getAttribute('data-name');
            const tier = document.getElementById('tier').value;
            const enc = document.getElementById('enchant').value;
            const qual = document.getElementById('quality').value;

            const fullID = `${tier}_${id}${enc > 0 ? '@' + enc : ''}`;
            
            document.getElementById('display').classList.remove('hidden');
            document.getElementById('final-name').innerText = name;
            document.getElementById('final-sub').innerText = document.getElementById('sub-menu').value;
            document.getElementById('t-tag').innerText = tier;
            document.getElementById('render').src = `https://render.albiononline.com/v1/item/${fullID}.png?quality=${qual}`;
        }
    </script>
</body>
</html>
