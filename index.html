<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z MARKET | Central Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="market-logic.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0c0c0d; 
            color: #d1d1d1; 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel { 
            background: rgba(20, 20, 22, 0.8); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        select {
            background: #1a1a1c;
            border: 1px solid #3f3f46;
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            outline: none;
            appearance: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        select:hover:not(:disabled) { border-color: #3b82f6; }
        select:disabled { opacity: 0.3; cursor: not-allowed; }
        label { 
            font-size: 11px; 
            font-weight: 800; 
            color: #71717a; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            display: block; 
            letter-spacing: 0.05em;
        }
        .item-card {
            background: linear-gradient(145deg, #18181b, #09090b);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="p-6 md:p-12 max-w-6xl mx-auto">

    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter">Z <span class="text-blue-500">MARKET</span></h1>
            <p class="text-xs text-zinc-500 font-bold uppercase tracking-widest">Global Database Sync</p>
        </div>
        <div class="text-right">
            <span class="bg-blue-500/10 text-blue-500 text-[10px] font-black px-3 py-1 rounded-full border border-blue-500/20">SYSTEM ACTIVE</span>
        </div>
    </header>

    <main class="glass-panel p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div>
                <label>Main Category</label>
                <select id="main-menu" onchange="loadSubCategoryFile(this.value)">
                    <option value="">Initializing...</option>
                </select>
            </div>

            <div>
                <label>Sub-Category</label>
                <select id="sub-menu" onchange="fillItemMenu()" disabled>
                    <option value="">--</option>
                </select>
            </div>

            <div>
                <label>Specific Item</label>
                <select id="item-menu" onchange="updateView()" disabled>
                    <option value="">--</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 p-6 bg-black/30 rounded-2xl border border-white/5 mb-10">
            <div>
                <label>Tier</label>
                <select id="tier" onchange="updateView()">
                    <option value="T8">Tier 8</option>
                    <option value="T7">Tier 7</option>
                    <option value="T6">Tier 6</option>
                    <option value="T5">Tier 5</option>
                    <option value="T4">Tier 4</option>
                    <option value="T3">Tier 3</option>
                </select>
            </div>
            <div>
                <label>Enchantment</label>
                <select id="enchant" onchange="updateView()">
                    <option value="0">.0 (None)</option>
                    <option value="1">.1 (Uncommon)</option>
                    <option value="2">.2 (Rare)</option>
                    <option value="3" selected>.3 (Exceptional)</option>
                    <option value="4">.4 (Pristine)</option>
                </select>
            </div>
            <div class="col-span-2 md:col-span-1">
                <label>Quality</label>
                <select id="quality" onchange="updateView()">
                    <option value="1">Normal</option>
                    <option value="2">Good</option>
                    <option value="3">Outstanding</option>
                    <option value="4">Excellent</option>
                    <option value="5" selected>Masterpiece</option>
                </select>
            </div>
        </div>

        <div id="display" class="hidden animate-in fade-in duration-500">
            <div class="item-card p-10 rounded-3xl flex flex-col md:flex-row items-center gap-10">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-blue-500 rounded-2xl blur opacity-20 group-hover:opacity-40 transition"></div>
                    <div class="relative w-32 h-32 bg-zinc-950 border border-white/10 rounded-2xl flex items-center justify-center overflow-hidden">
                        <img id="render" src="" alt="Item Render" class="w-24 h-24 object-contain z-10">
                        <div id="t-tag" class="absolute top-0 left-0 bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded-br-lg shadow-lg"></div>
                    </div>
                </div>

                <div class="text-center md:text-left">
                    <p id="final-sub" class="text-blue-400 text-[10px] font-black tracking-[0.3em] uppercase mb-1"></p>
                    <h2 id="final-name" class="text-3xl md:text-4xl font-black text-white italic tracking-tight mb-2"></h2>
                    <div class="flex flex-wrap justify-center md:justify-start gap-2 mt-4">
                        <span class="px-3 py-1 bg-white/5 rounded-md text-[10px] font-bold text-zinc-400 border border-white/5">FULL SYNC ENABLED</span>
                        <span class="px-3 py-1 bg-white/5 rounded-md text-[10px] font-bold text-zinc-400 border border-white/5 uppercase">Albion API 1.0</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-12 text-center">
        <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest leading-loose">
            Designed for Automated Financial Trading & Bot Integration<br>
            All assets property of Sandbox Interactive GmbH
        </p>
    </footer>

</body>
</html>
