<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-MARKET | Albion Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #f8fafc; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .z-gradient { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); }
        .z-text-gradient { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-active { background: #f8fafc !important; color: #050505 !important; font-weight: 800; border-color: #f8fafc !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24">

    <nav class="p-5 flex justify-between items-center sticky top-0 z-40 glass border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 z-gradient rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                <span class="text-white font-black text-2xl italic">Z</span>
            </div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic">Z-<span class="z-text-gradient">MARKET</span></h1>
        </div>
        <div class="text-right">
            <div class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Global Vol</div>
            <div class="text-xs font-black text-white italic">1.2B <small class="text-purple-500">S</small></div>
        </div>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div class="glass p-4 rounded-2xl mb-8">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 text-purple-400">Market Pulse</span>
                <span class="text-[10px] font-black uppercase text-green-400">Stable</span>
            </div>
            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden flex">
                <div class="h-full bg-purple-500" style="width: 75%"></div>
                <div class="h-full bg-white/20" style="width: 25%"></div>
            </div>
        </div>

        <div class="relative mb-8">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-5 h-5"></i>
            <input type="text" placeholder="Scan assets..." 
                   class="w-full bg-[#0f0f0f] border border-white/5 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:border-purple-500/50 transition-all text-sm">
        </div>

        <div class="space-y-3">
            <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] px-2 mb-4 italic">Best Global Opportunities</h3>
            
            <div onclick="showChart('Swiftclaw', 138000, 'Lymhurst')" class="glass p-5 rounded-3xl flex justify-between items-center active:scale-95 transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl">🐆</div>
                    <div>
                        <div class="font-bold text-slate-100 italic">Swiftclaw</div>
                        <div class="text-[9px] uppercase font-black text-green-400">Best: Lymhurst</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-black text-lg tabular-nums">138,000</div>
                    <div class="text-[9px] text-slate-500 font-bold uppercase">Global Low</div>
                </div>
            </div>

            <div onclick="showChart('T8 Greataxe', 272000, 'Caerleon')" class="glass p-5 rounded-3xl flex justify-between items-center active:scale-95 transition-all cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl">🪓</div>
                    <div>
                        <div class="font-bold text-slate-100 italic">T8 Greataxe</div>
                        <div class="text-[9px] uppercase font-black text-purple-400">Best: Caerleon</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-black text-lg tabular-nums">272,000</div>
                    <div class="text-[9px] text-slate-500 font-bold uppercase">Daily Low</div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-50 hidden opacity-0 transition-opacity duration-300" onclick="closeChart()"></div>

    <div id="chartSheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[40px] z-[60] translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] p-8 max-h-[95vh] overflow-y-auto">
        <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-8"></div>
        
        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 id="modalTitle" class="text-3xl font-black italic tracking-tighter uppercase">ITEM</h2>
                <p id="modalCity" class="text-purple-500 text-[10px] font-black uppercase tracking-widest mt-1">CITY EXCHANGE</p>
            </div>
            <div class="text-right">
                <div id="modalPrice" class="text-2xl font-black">0</div>
                <div id="modalChange" class="text-xs font-black text-green-400 uppercase italic">+2.1%</div>
            </div>
        </div>

        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="changeCity('Lymhurst')" class="city-pill btn-active flex-shrink-0 px-5 py-2.5 rounded-xl text-[10px] font-black border border-white/10 uppercase tracking-widest transition-all">Lymhurst</button>
            <button onclick="changeCity('Bridgewatch')" class="city-pill flex-shrink-0 px-5 py-2.5 rounded-xl text-[10px] font-black border border-white/5 text-slate-500 uppercase tracking-widest transition-all">Bridgewatch</button>
            <button onclick="changeCity('Martlock')" class="city-pill flex-shrink-0 px-5 py-2.5 rounded-xl text-[10px] font-black border border-white/5 text-slate-500 uppercase tracking-widest transition-all">Martlock</button>
            <button onclick="changeCity('Thetford')" class="city-pill flex-shrink-0 px-5 py-2.5 rounded-xl text-[10px] font-black border border-white/5 text-slate-500 uppercase tracking-widest transition-all">Thetford</button>
            <button onclick="changeCity('Caerleon')" class="city-pill flex-shrink-0 px-5 py-2.5 rounded-xl text-[10px] font-black border border-white/5 text-slate-500 uppercase tracking-widest transition-all">Caerleon</button>
        </div>

        <div class="flex p-1 bg-white/5 rounded-2xl mb-8 border border-white/5">
            <button onclick="setTime('1D')" class="time-btn flex-1 py-3 rounded-xl text-[10px] font-black btn-active">1D</button>
            <button onclick="setTime('1W')" class="time-btn flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500">1W</button>
            <button onclick="setTime('ALL')" class="time-btn flex-1 py-3 rounded-xl text-[10px] font-black text-slate-500">ALL</button>
        </div>

        <div class="h-64 w-full mb-10">
            <canvas id="priceChart"></canvas>
        </div>

        <button onclick="closeChart()" class="w-full z-gradient py-5 rounded-2xl font-black text-white uppercase tracking-widest text-xs active:scale-95 transition-all">
            Return to Terminal
        </button>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('priceChart').getContext('2d');
        lucide.createIcons();

        function showChart(name, price, bestCity) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = price.toLocaleString();
            document.getElementById('modalCity').innerText = bestCity + " EXCHANGE";
            
            const overlay = document.getElementById('modalOverlay');
            const sheet = document.getElementById('chartSheet');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            sheet.classList.remove('translate-y-full');

            renderChart();
        }

        function closeChart() {
            const overlay = document.getElementById('modalOverlay');
            const sheet = document.getElementById('chartSheet');
            overlay.classList.remove('opacity-100');
            sheet.classList.add('translate-y-full');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        function changeCity(city) {
            // Update UI
            document.querySelectorAll('.city-pill').forEach(btn => {
                btn.classList.remove('btn-active');
                btn.classList.add('text-slate-500', 'border-white/5');
            });
            event.target.classList.add('btn-active');
            event.target.classList.remove('text-slate-500');

            document.getElementById('modalCity').innerText = city.toUpperCase() + " EXCHANGE";
            
            // Simulate Price Change
            const randomPrice = Math.floor(Math.random() * 50000) + 100000;
            document.getElementById('modalPrice').innerText = randomPrice.toLocaleString();
            
            renderChart();
        }

        function setTime(range) {
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('btn-active');
                btn.classList.add('text-slate-500');
            });
            event.target.classList.add('btn-active');
            event.target.classList.remove('text-slate-500');
            renderChart();
        }

        function renderChart() {
            if (chart) chart.destroy();
            const data = Array.from({length: 15}, () => Math.floor(Math.random() * 40) + 60);
            const vol = Array.from({length: 15}, () => Math.floor(Math.random() * 30));

            chart = new Chart(ctx, {
                data: {
                    labels: Array(15).fill(''),
                    datasets: [{
                        type: 'line',
                        data: data,
                        borderColor: '#a855f7',
                        borderWidth: 4,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0, 0, 0, 300);
                            g.addColorStop(0, 'rgba(168, 85, 247, 0.3)');
                            g.addColorStop(1, 'transparent');
                            return g;
                        }
                    }, {
                        type: 'bar',
                        data: vol,
                        backgroundColor: 'rgba(255,255,255,0.05)',
                        borderRadius: 4,
                        yAxisID: 'v'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: true, position: 'right', grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: '#444', font: { size: 9, weight: '800' } } },
                        v: { display: false, max: 100 }
                    }
                }
            });
        }
    </script>
</body>
</html>
